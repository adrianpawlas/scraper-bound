name: Run Weare Bound Scraper

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type'
        required: true
        default: 'manual'
        type: choice
        options:
          - 'manual'
          - 'scheduled'
  schedule:
    - cron: '0 8 * * *'

jobs:
  scrape:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run scraper
        env:
          PYTHONUNBUFFERED: 1
        run: python run.py
